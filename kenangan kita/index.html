<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kenangan Kita Berdua ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe6f0 0%, #ffd9e5 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 25px 20px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h1 {
            font-size: 2.2rem;
            text-align: center;
            color: #b23c5c;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        h1 span {
            font-size: 2.5rem;
        }

        .sub {
            text-align: center;
            color: #d96c8e;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* Form upload */
        .upload-area {
            background: #fff0f3;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 35px;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            font-weight: 600;
            color: #a13e5c;
            display: block;
            margin-bottom: 8px;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px dashed #f3a7b9;
            border-radius: 28px;
            background: white;
            cursor: pointer;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 18px;
            border: 1px solid #f3a7b9;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        input[type="text"]:focus {
            border-color: #c75c7c;
            box-shadow: 0 0 0 2px #ffb7c9;
        }

        .btn-upload {
            background: #e27294;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        .btn-upload:hover {
            background: #c15577;
            transform: scale(1.01);
        }

        /* Galeri */
        .gallery-title {
            font-size: 1.8rem;
            margin: 20px 0 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #a83e5c;
            border-left: 6px solid #f7a1b5;
            padding-left: 16px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 22px;
        }

        .memory-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        .memory-card:hover {
            transform: translateY(-6px);
        }

        .memory-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #f9e2e8;
            display: block;
        }

        .memory-caption {
            padding: 12px 15px;
            font-size: 0.95rem;
            color: #4a2c36;
            background: #fffafc;
            word-break: break-word;
            font-weight: 500;
            border-top: 1px solid #ffe2ea;
        }

        .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            width: 34px;
            height: 34px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .delete-btn:hover {
            background: #c9184a;
            transform: scale(1.05);
        }

        .empty-message {
            text-align: center;
            padding: 50px 20px;
            background: #ffecf0;
            border-radius: 40px;
            color: #b85878;
            font-size: 1.2rem;
        }

        .footer-note {
            text-align: center;
            margin-top: 40px;
            font-size: 0.85rem;
            color: #c96f8b;
        }

        @media (max-width: 550px) {
            .container {
                padding: 18px;
            }
            h1 {
                font-size: 1.6rem;
            }
            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>
        <span>📸</span> Kenangan Manis Kita <span>💖</span>
    </h1>
    <div class="sub">setiap foto adalah cerita cinta</div>

    <!-- Area upload -->
    <div class="upload-area">
        <div class="form-group">
            <label>📷 Pilih foto kenangan</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        <div class="form-group">
            <label>✍️ Cerita / caption (opsional)</label>
            <input type="text" id="captionInput" placeholder="Contoh: 'Saat kita jalan-jalan ke pantai, kamu tersenyum manis...'">
        </div>
        <button class="btn-upload" id="uploadBtn">💾 Simpan Kenangan</button>
    </div>

    <div class="gallery-title">
        <span>📖</span> Galeri Cinta
    </div>
    <div id="galleryContainer" class="gallery">
        <!-- Foto akan dimuat dari localStorage di sini -->
        <div class="empty-message">Belum ada foto. Yuk upload kenangan pertama kalian! ❤️</div>
    </div>
    <div class="footer-note">
        🌸 Foto tersimpan di browser kamu. Tidak akan hilang meskipun direfresh.
    </div>
</div>

<script>
    // Key untuk localStorage
    const STORAGE_KEY = "kenanganKita";

    // Ambil data dari localStorage atau buat array kosong
    let memories = [];

    // Load data saat halaman dimuat
    function loadMemories() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            memories = JSON.parse(stored);
        } else {
            memories = [];
        }
        renderGallery();
    }

    // Simpan array memories ke localStorage
    function saveMemories() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(memories));
        renderGallery();
    }

    // Menampilkan galeri
    function renderGallery() {
        const container = document.getElementById("galleryContainer");
        if (!memories.length) {
            container.innerHTML = `<div class="empty-message">✨ Belum ada foto. Yuk upload kenangan pertama kalian! ✨</div>`;
            return;
        }

        let html = "";
        memories.forEach((mem, index) => {
            html += `
                <div class="memory-card">
                    <img class="memory-img" src="${mem.imageData}" alt="kenangan">
                    <div class="memory-caption">${escapeHtml(mem.caption) || "💕 Kenangan indah tanpa kata"}</div>
                    <button class="delete-btn" data-index="${index}">🗑️</button>
                </div>
            `;
        });
        container.innerHTML = html;

        // Pasang event listener untuk semua tombol hapus
        document.querySelectorAll(".delete-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const idx = parseInt(btn.getAttribute("data-index"));
                if (!isNaN(idx)) {
                    memories.splice(idx, 1);
                    saveMemories();
                }
            });
        });
    }

    // Fungsi sederhana untuk mencegah XSS
    function escapeHtml(str) {
        if (!str) return "";
        return str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    // Upload foto baru
    function addNewMemory(imageFile, caption) {
        if (!imageFile) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const imageData = event.target.result; // base64
            memories.unshift({  // tambah di awal agar foto terbaru di atas
                imageData: imageData,
                caption: caption || "",
                date: new Date().toISOString()
            });
            saveMemories();

            // reset form
            document.getElementById("imageInput").value = "";
            document.getElementById("captionInput").value = "";
        };
        reader.readAsDataURL(imageFile);
    }

    // Event tombol upload
    document.getElementById("uploadBtn").addEventListener("click", () => {
        const fileInput = document.getElementById("imageInput");
        const caption = document.getElementById("captionInput").value.trim();
        const file = fileInput.files[0];

        if (!file) {
            alert("Pilih dulu foto kenangan ya 😊");
            return;
        }

        // Validasi ukuran (max 5 MB, bisa disesuaikan)
        if (file.size > 5 * 1024 * 1024) {
            alert("Ukuran foto terlalu besar (maks 5 MB). Kamu bisa kompres dulu ya.");
            return;
        }

        addNewMemory(file, caption);
    });

    // Inisialisasi
    loadMemories();
</script>
</body>
</html>
